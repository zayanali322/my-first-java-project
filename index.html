<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Java Learning Journey</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 40px;
            margin: 20px auto;
            max-width: 800px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1);
            text-align: center;
            animation: slideIn 1s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            font-weight: 700;
        }

        p {
            font-size: 1.2rem;
            margin: 15px 0;
            opacity: 0.9;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            margin: 20px auto;
            max-width: 600px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        .btn {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 107, 107, 0.6);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        #fruits-display {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            min-height: 60px;
            border-left: 4px solid #4ecdc4;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            color: #fff;
            line-height: 1.8;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            min-width: 150px;
            backdrop-filter: blur(10px);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
        }

        .fruits-list {
            list-style: none;
            margin-top: 15px;
        }

        .fruits-list li {
            background: rgba(255, 255, 255, 0.2);
            margin: 8px 0;
            padding: 10px 15px;
            border-radius: 25px;
            border-left: 4px solid #feca57;
            transition: all 0.3s ease;
        }

        .fruits-list li:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(10px);
        }

        @media (max-width: 768px) {
            .glass, .container {
                margin: 10px;
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .stats {
                flex-direction: column;
                align-items: center;
            }
        }

        .welcome-section {
            position: relative;
            overflow: hidden;
        }

        .welcome-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
    </style>
</head>

<body>
    <div class="glass welcome-section">
        <h1>Welcome to My JavaScript Journey! 🚀</h1>
        <p>I am learning JavaScript and building awesome things!</p>
    </div>

    <div id="firstcontainer" class="container">
        <button id="click" class="btn">✨ Interactive Button</button>
    </div>

    <div class="container">
        <p>This is an advanced fruit collection app! 🍎🍌🍇</p>
        <button onclick="addfurit()" class="btn">➕ Add Your Favorite Fruit</button>
        <div id="simpel">
            <div id="fruits-display">Click "Add Fruit" to start collecting! 🎉</div>
        </div>
        <button onclick="count()" class="btn">📊 Show Stats</button>
        
        <div class="stats">
            <div class="stat-card">
                <span class="stat-number" id="fruitCount">0</span>
                Total Fruits
            </div>
            <div class="stat-card">
                <span class="stat-number" id="uniqueCount">0</span>
                Unique Fruits
            </div>
        </div>
    </div>

    <script>
        var furit = [];
        
        function addfurit() {
            var customerfruits = prompt("What's your favorite fruit? 🍓");
            if (customerfruits && customerfruits.trim() !== "") {
                customerfruits = customerfruits.trim();
                furit[furit.length] = customerfruits;
                displayFruits();
                updateStats();
                
                // Add celebration effect
                celebrate();
            } else {
                alert("Please enter a fruit name! 😊");
            }
        }
        
        function count() {
            if (furit.length === 0) {
                alert("No fruits added yet! Add some fruits first! 🍎");
            } else {
                alert(`🎉 You have entered ${furit.length} fruit${furit.length !== 1 ? 's' : ''}!\n\n` +
                      `Unique fruits: ${new Set(furit).size}\n` +
                      `Your fruits: ${furit.join(', ')}`);
            }
        }
        
        function displayFruits() {
            const display = document.getElementById("fruits-display");
            if (furit.length === 0) {
                display.innerHTML = "Click 'Add Fruit' to start collecting! 🎉";
            } else {
                const fruitsList = furit.map((fruit, index) => 
                    `<li>🍎 ${index + 1}. ${fruit}</li>`
                ).join('');
                display.innerHTML = `
                    <div>Your Fruits Collection:</div>
                    <ul class="fruits-list">${fruitsList}</ul>
                `;
            }
        }
        
        function updateStats() {
            document.getElementById("fruitCount").textContent = furit.length;
            document.getElementById("uniqueCount").textContent = new Set(furit).size;
        }
        
        function celebrate() {
            // Simple celebration animation
            const containers = document.querySelectorAll('.container');
            containers.forEach(container => {
                container.style.animation = 'none';
                setTimeout(() => {
                    container.style.animation = 'slideIn 0.5s ease-out';
                }, 10);
            });
        }
        
        // Interactive button functionality
        document.getElementById("click").addEventListener("click", function() {
            this.innerHTML = "Clicked! 🎉";
            this.style.background = "linear-gradient(45deg, #4ecdc4, #44a08d)";
            setTimeout(() => {
                this.innerHTML = "✨ Interactive Button";
                this.style.background = "";
            }, 1000);
        });

        // Initialize stats
        updateStats();
    </script>
</body>
</html>
